<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Will Hooper — Projects</title>
<meta name="description" content="Applied modelling and tooling projects. Measured, documented, and open.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f2efe8; --panel:#f8f6f0;
    --ink:#211e18; --ink2:#433d33; --mute:#726c60; --faint:#9a9283;
    --rule:#ddd6c8; --rule2:#c6bdaa;
    --accent:#9c3d2b; --live:#40734f;
    --serif:"Newsreader",Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,"Cascadia Code",Consolas,monospace;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.65;
       font-family:var(--sans);font-size:16px;
       -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:var(--accent);text-decoration:none}
  a:hover{color:var(--accent)}
  .wrap{max-width:1040px;margin:0 auto;padding:0 40px}

  /* running head — a letterhead rule */
  .runhead{border-bottom:1px solid var(--rule)}
  .runhead .wrap{display:flex;justify-content:space-between;align-items:center;
       height:48px;font-family:var(--mono);font-size:11px;letter-spacing:.2em;
       text-transform:uppercase;color:var(--faint)}
  .runhead b{color:var(--ink);font-weight:500;letter-spacing:.18em}

  /* masthead */
  header{padding:40px 0 30px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.34em;
           text-transform:uppercase;color:var(--accent);margin-bottom:16px}
  h1{margin:0;font-family:var(--serif);font-size:clamp(44px,6.2vw,72px);
     font-weight:500;line-height:.96;letter-spacing:-.015em;color:var(--ink)}
  .intro{margin:20px 0 0;font-family:var(--serif);font-size:clamp(18px,2vw,22px);
         font-weight:400;line-height:1.5;color:var(--ink2);max-width:40ch;
         text-wrap:pretty}
  .meta{margin-top:24px;display:flex;flex-wrap:wrap;font-family:var(--mono);
        font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .meta span{padding-right:20px;margin-right:20px;border-right:1px solid var(--rule)}
  .meta span:last-child{border-right:none;margin-right:0;padding-right:0}
  .meta b{color:var(--ink);font-weight:500}

  /* section labels — leader rule */
  section{padding:14px 0 8px}
  .seclabel{display:flex;align-items:baseline;gap:22px;margin:0;
            font-family:var(--mono);font-size:12px;font-weight:500;
            letter-spacing:.3em;text-transform:uppercase;color:var(--mute)}
  .seclabel::after{content:"";flex:1;height:1px;background:var(--rule);
                   position:relative;top:-3px}
  .lead{margin:16px 0 0;font-size:14.5px;color:var(--mute);max-width:62ch;
        text-wrap:pretty}

  /* the register of works */
  .rows{margin-top:22px;border-top:2px solid var(--ink)}
  .row{position:relative;display:grid;
       grid-template-columns:52px minmax(0,1fr) 224px;gap:44px;align-items:start;
       padding:36px 0;border-bottom:1px solid var(--rule);
       transition:background .14s ease}
  .row:hover{background:var(--panel)}

  .idx{font-family:var(--mono);font-size:12.5px;color:var(--faint);
       padding-top:11px;letter-spacing:.04em;transition:color .14s ease}
  .row:hover .idx{color:var(--accent)}

  .head{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
  .name{margin:0;font-family:var(--serif);font-size:31px;font-weight:500;
        letter-spacing:-.01em;color:var(--ink);transition:color .14s ease;line-height:1.1}
  .name a{color:inherit}
  .name a::after{content:"";position:absolute;inset:0}
  .name a:focus-visible::after{outline:2px solid var(--accent);outline-offset:2px}
  .row:hover .name{color:var(--accent)}
  .status{display:inline-flex;align-items:center;gap:8px;margin:0;
          font-family:var(--mono);font-size:10px;letter-spacing:.16em;
          text-transform:uppercase;color:var(--mute)}
  .status .dot{width:6px;height:6px;border-radius:50%;background:var(--rule2);flex:none}
  .status.on{color:var(--ink)}
  .status.on .dot{background:var(--ink);box-shadow:0 0 0 3px rgba(33,30,24,.12)}
  .desc{margin:15px 0 0;font-size:14.5px;line-height:1.6;color:var(--ink2);
        max-width:58ch;text-wrap:pretty}
  .blurb{margin:11px 0 0;font-size:14.5px;line-height:1.5;color:var(--mute);
         max-width:52ch;text-wrap:pretty}

  /* documents ledger — one label per line, identical spacing every row */
  .links{display:flex;flex-direction:column;position:relative;z-index:1;padding-top:5px}
  .links a,.links span{display:flex;align-items:baseline;justify-content:space-between;
       gap:12px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;
       text-transform:uppercase;padding:8px 0;border-bottom:1px solid var(--rule)}
  .links a{color:var(--ink2)}
  .links a:first-child{color:var(--ink)}
  .links a::after{content:"↗";color:var(--faint);font-size:10px}
  .links a:hover{color:var(--accent);border-bottom-color:var(--rule2)}
  .links a:hover::after{color:var(--accent)}
  .links span{color:var(--faint);cursor:default}
  .links span::after{content:"—";color:var(--rule2)}

  /* method — a spec table, principle by principle */
  .std{margin-top:22px;border-top:2px solid var(--ink);
       display:grid;grid-template-columns:repeat(3,1fr);counter-reset:m}
  .std div{counter-increment:m;padding:28px 28px 32px;
           border-bottom:1px solid var(--rule);border-right:1px solid var(--rule)}
  .std div:nth-child(3n){border-right:none;padding-right:0}
  .std div:nth-child(3n+1){padding-left:0}
  .std div::before{content:counter(m,decimal-leading-zero);display:block;
       font-family:var(--mono);font-size:11px;letter-spacing:.12em;
       color:var(--accent);margin-bottom:16px}
  .std b{display:block;font-family:var(--serif);font-weight:500;font-size:19px;
         color:var(--ink);margin-bottom:9px;line-height:1.2}
  .std p{margin:0;font-size:13.5px;line-height:1.55;color:var(--mute);
         max-width:36ch;text-wrap:pretty}

  footer{margin-top:14px;border-top:1px solid var(--rule);padding:20px 0 24px;
         font-family:var(--mono);font-size:11px;letter-spacing:.12em;
         text-transform:uppercase;color:var(--faint)}
  footer a{color:var(--mute)}
  footer a:hover{color:var(--accent)}

  @media(max-width:820px){
    .wrap{padding:0 22px}
    .runhead .wrap span:last-child{display:none}
    header{padding:32px 0 26px}
    .intro{max-width:none}
    .row{grid-template-columns:1fr;gap:0;padding:26px 0}
    .idx{display:none}
    .desc{max-width:none}
    .links{margin-top:16px;padding-top:14px;border-top:1px solid var(--rule)}
    .links a,.links span{justify-content:flex-start;gap:8px;padding:6px 0;
         border-bottom:none}
    .std{grid-template-columns:1fr}
    .std div{border-right:none!important;padding:22px 0!important}
  }
</style>
</head>
<body>

<div class="runhead">
  <div class="wrap"><b>Will Hooper</b><span>Selected works</span></div>
</div>

<header>
  <div class="wrap">
    <div class="eyebrow">Applied modelling and tooling</div>
    <h1>Will Hooper</h1>
    <p class="intro">I turn messy odds into clear calls — prediction markets, competitive Pokémon,
       and everything I can measure.</p>
    <div class="meta" id="meta"></div>
  </div>
</header>

<section>
  <div class="wrap">
    <h2 class="seclabel">Projects</h2>
    <div class="rows" id="rows"></div>
  </div>
</section>

<footer>
  <div class="wrap">
    <span id="year"></span> · Built and documented by Will Hooper ·
    <a href="mailto:willjhooper@msn.com">willjhooper@msn.com</a>
  </div>
</footer>

<script>
/* ─────────────────────────────────────────────────────────────
   ADD A PROJECT: append one object to PROJECTS. Nothing else.

   docs.open is the primary destination; the whole row links there.
   Leave a document as "" and it renders dimmed instead of missing,
   which keeps every column identical down the page.

   PUBLISHING: set GITHUB to the repo base URL and every local doc
   link switches over, e.g.
   const GITHUB = "https://github.com/willhoop/projects/blob/main/";
   ───────────────────────────────────────────────────────────── */
/* Left empty on purpose. The `src` paths below assume a single monorepo
   (Pokemon/CHOMP/docs/...), but each project now lives in its own repository,
   so no single base URL can resolve them. The `local` paths point at the
   rendered HTML copies in docs/, which ship with this site and always work.
   To switch a single project to its source repo, use a full URL in its links. */
const GITHUB = "";                     // "" = use local rendered docs
const doc = (p) => GITHUB ? GITHUB + p.src : p.local;

/* Event Desks keeps its source in its own repository, like every other project.
   willhoop/event-desk is the DEPLOY target for elitefourcapital.com and holds only
   the built file — never push source there. */

/* Every project shows the SAME five rows in the SAME order, so the columns line
   up across the whole page. A document that does not exist yet is shown dimmed
   rather than hidden — a gap you can see is better than a gap you cannot. */
const SLOTS = ["open","paper","deck","docs","source"];
const LABEL = { open:"Open", paper:"White paper", deck:"Slide deck",
                docs:"Technical docs", source:"Source" };

const PROJECTS = [
  {
    name: "CHOMP",
    status: "In daily use", live: true,
    blurb: "Real-time team-preview engine for competitive Pokémon VGC.",
    desc: "A decision engine for competitive Pokémon, running as a Pokémon Showdown userscript. At team preview on the Champions VGC (Reg M-B) ladder you have about 30 seconds to choose four of six Pokémon and which two to lead. CHOMP runs the game's real damage mathematics across every matchup and answers in under 50 milliseconds, in the browser.",
    docs: {
      open:   "apps/chomp-replay-app.html",
      paper:  doc({local:"docs/CHOMP/CHOMP-whitepaper.html", src:"Pokemon/CHOMP/docs/CHOMP-whitepaper.md"}),
      deck:   doc({local:"docs/CHOMP/CHOMP-deck-plain-english.pdf", src:"Pokemon/CHOMP/docs/CHOMP-deck-plain-english.pptx"}),
      docs:   doc({local:"docs/CHOMP/CHOMP-technical-docs.html", src:"Pokemon/CHOMP/docs/CHOMP-technical-docs.md"}),
      source: "https://github.com/willhoop/chomp"
    }
  },
  {
    name: "ABRA",
    status: "In development — v2.2.0", live: false,
    blurb: "The model family behind CHOMP — and it grades every prediction it makes.",
    desc: "The research engine behind CHOMP. It ingests thousands of real Champions VGC ladder games and builds a family of small, CPU-only models: an exact damage engine validated against @smogon/calc, and a mid-game win-probability net (PORY) that beats a coin flip on held-out games — log-loss 0.567 versus 0.693, calibrated to within 1.6%. Its discipline is honesty. Every probability ships with a proper score, a confidence interval, and a baseline, and it reports what it cannot predict — the winner from team sheets alone is a coin flip in this format — as plainly as what it can.",
    docs: {
      open:   "https://github.com/willhoop/abra",
      paper:  "https://github.com/willhoop/abra/blob/main/docs/ABRA-whitepaper.md",
      deck:   "https://github.com/willhoop/abra/blob/main/docs/ABRA-deck-plain-english.md",
      docs:   "https://github.com/willhoop/abra/blob/main/docs/ABRA-technical-docs.md",
      source: "https://github.com/willhoop/abra"
    }
  },
  {
    name: "Event Desks",
    status: "Live at elitefourcapital.com", live: true,
    blurb: "Prediction-market desk that prices Polymarket and Kalshi contracts.",
    desc: "Prices event contracts on Polymarket and Kalshi and shows where the market looks overconfident. It ranks a candidate field by conversion — the presidency price divided by the nomination price — which reads as the market's odds a candidate wins once nominated.",
    docs: {
      open:   "https://elitefourcapital.com",
      paper:  "docs/EventDesks/white-paper.html",
      deck:   "docs/EventDesks/deck.html",
      docs:   "docs/EventDesks/README.html",
      source: "https://github.com/willhoop/elitefourcapital"
    }
  },
  {
    name: "HoopaDex",
    status: "Live — v1.93", live: true,
    blurb: "A generation-aware Pokédex in a single HTML file.",
    desc: "A complete Pokédex in a single HTML file — no build step, no server, no dependencies. It renders the type chart, base stats, typings and evolution lines as they were in the generation you select. Steel resisted Ghost and Dark before generation 6; Fairy did not exist.",
    docs: {
      /* The app lives at app/index.html in its repository. Linking the repo root
         served the README through Jekyll's default theme instead of the app. */
      open:   "https://willhoop.github.io/hoopadex/app/",
      paper:  "docs/HoopaDex/HOOPADEX-whitepaper.html",
      deck:   "docs/HoopaDex/HOOPADEX-deck-plain-english.html",
      docs:   doc({local:"docs/HoopaDex/HOOPADEX-technical-docs.html", src:"Pokemon/HoopaDex/docs/HOOPADEX-technical-docs.md"}),
      source: "https://github.com/willhoop/hoopadex"
    }
  },
  {
    name: "Kaizo Dex",
    status: "Live", live: true,
    blurb: "A run companion for the Emerald Kaizo nuzlocke.",
    desc: "A companion for an Emerald Kaizo nuzlocke. It carries the romhack's real trainer rosters and encounter tables, an embedded damage calculator, and a run tracker whose species field only offers the encounters a route can actually give you.",
    docs: {
      open:   "https://willhoop.github.io/kaizodex/app/",
      paper:  "docs/KaizoDex/KAIZODEX-whitepaper.html",
      deck:   "docs/KaizoDex/KAIZODEX-deck-plain-english.html",
      docs:   "docs/KaizoDex/KAIZODEX-technical-docs.html",
      source: "https://github.com/willhoop/kaizodex"
    }
  },
  {
    name: "Jeopardy Wagering",
    status: "Live — v1.4", live: true,
    blurb: "A wagering-strategy trainer for Daily Double and Final Jeopardy bets.",
    desc: "A wagering-strategy trainer for Jeopardy!'s two money decisions, the Daily Double and Final Jeopardy. It separates a worst-case guarantee — the bet that cannot cost you the lead when you are right — from a confidence-weighted, Monte Carlo best-response, runs entirely in the browser, and ships with a graded practice quiz. The method, including a documented common-random-numbers fix and a multiple-comparisons-with-the-best wager selection, is written up in a white paper and two statistical reviews.",
    docs: {
      /* The app lives at app/index.html in its repository, like HoopaDex —
         linking the repo root would serve the README through Jekyll instead. */
      open:   "https://willhoop.github.io/jeopardy-wagering/app/",
      paper:  "https://willhoop.github.io/jeopardy-wagering/build/white-paper.pdf",
      deck:   "https://willhoop.github.io/jeopardy-wagering/build/deck.pdf",
      docs:   "https://github.com/willhoop/jeopardy-wagering/blob/main/docs/README.md",
      source: "https://github.com/willhoop/jeopardy-wagering"
    }
  }
];

document.getElementById('rows').innerHTML = PROJECTS.map((p, i) => `
  <article class="row">
    <div class="idx">${String(i + 1).padStart(2, '0')}</div>
    <div>
      <div class="head">
        <h3 class="name"><a href="${p.docs.open}" target="_blank" rel="noopener">${p.name}</a></h3>
      </div>
      <p class="desc">${p.desc}</p>
    </div>
    <div class="links">${SLOTS.map(k => p.docs[k]
      ? `<a href="${p.docs[k]}" target="_blank" rel="noopener">${LABEL[k]}</a>`
      : `<span title="not written yet">${LABEL[k]}</span>`).join('')}</div>
  </article>`).join('');

const liveCount = PROJECTS.filter(p => p.live).length;
document.getElementById('meta').innerHTML =
  `<span><b>${PROJECTS.length}</b> projects</span>` +
  `<span><b>${liveCount}</b> live</span>` +
  `<span>Updated <b>${new Date().getFullYear()}</b></span>`;
document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
